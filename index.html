<!DOCTYPE html>
<html>
<head>
<title>Advanced Mini CRM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Client Lead Management System</h1>

<div class="stats">
<h3>Total Leads: <span id="count">0</span></h3>
</div>

<input type="text" id="search" placeholder="Search Lead..." onkeyup="searchLead()">

<input type="text" id="name" placeholder="Client Name">
<input type="email" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone">

<select id="status">
<option>New</option>
<option>Contacted</option>
<option>Closed</option>
</select>

<button onclick="addLead()">Add Lead</button>

<div id="leadList"></div>

</div>

<script src="script.js"></script>
</body>
</html>
